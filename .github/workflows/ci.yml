name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      # Install with dependency RANGES (robust across the matrix). The exact
      # reproducible environment is pinned in requirements.lock.txt.
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,graph,otlp,serve]"
      - name: Lint (ruff)
        run: ruff check .
      # pytest includes the eval-regression gate (tests/test_eval_regression.py):
      # a change that regresses the committed calibration fails the build.
      - name: Tests + eval-regression gate
        run: pytest -q
